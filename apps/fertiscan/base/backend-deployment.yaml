apiVersion: apps/v1
kind: Deployment
metadata:
  name: fertiscan-backend
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: fertiscan-backend
  template:
    metadata:
      labels:
        app: fertiscan-backend
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: type
                    operator: In
                    values:
                      - app-worker
      initContainers:
        - name: wait-for-dependencies
          image: ghcr.io/ai-cfia/fertiscan-backend:main
          imagePullPolicy: Always
          command: ["uv", "run", "python", "-m", "app.backend_pre_start"]
          envFrom:
            - secretRef:
                name: fertiscan-backend-secrets
        - name: run-migrations
          image: ghcr.io/ai-cfia/fertiscan-backend:main
          imagePullPolicy: Always
          command: ["uv", "run", "alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: fertiscan-backend-secrets
        - name: init-db
          image: ghcr.io/ai-cfia/fertiscan-backend:main
          imagePullPolicy: Always
          command: ["uv", "run", "python", "-m", "app.db.init_db"]
          envFrom:
            - secretRef:
                name: fertiscan-backend-secrets
        - name: init-storage
          image: ghcr.io/ai-cfia/fertiscan-backend:main
          imagePullPolicy: Always
          command: ["uv", "run", "python", "-m", "app.storage.init"]
          envFrom:
            - secretRef:
                name: fertiscan-backend-secrets
      containers:
        - name: fertiscan-backend
          image: ghcr.io/ai-cfia/fertiscan-backend:main
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: fertiscan-backend-secrets
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: tmp
              mountPath: /cachedir_joblib
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            runAsNonRoot: false
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: fertiscan-backend-svc
spec:
  clusterIP: None
  selector:
    app: fertiscan-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
      name: api
