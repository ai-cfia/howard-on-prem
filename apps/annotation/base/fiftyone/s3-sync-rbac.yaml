---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: fiftyone-s3-sync-runner
rules:
  - apiGroups:
      - batch
    resources:
      - jobs
    verbs:
      - create
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: fiftyone-s3-sync-runner
subjects:
  - kind: ServiceAccount
    name: on-prem-gh-runners-gha-rs-no-permission
    namespace: on-prem-gh-runners
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: fiftyone-s3-sync-runner
