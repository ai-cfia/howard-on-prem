---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fiftyone
  labels:
    app.kubernetes.io/name: fiftyone
    app.kubernetes.io/part-of: fiftyone
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: fiftyone
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fiftyone
        app.kubernetes.io/part-of: fiftyone
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: type
                    operator: In
                    values:
                      - ai-worker
      containers:
        - name: fiftyone
          image: >-
            ghcr.io/ai-cfia/fiftyone:1.15.0-python3.9-plugins-torch-20260604
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /opt/fiftyone-startup/wait-for-s3-mount.sh
          env:
            - name: FIFTYONE_DATABASE_URI
              value: mongodb://mongodb.mongodb.svc.cluster.local:27017/fiftyone
            - name: FIFTYONE_DEFAULT_APP_ADDRESS
              value: 0.0.0.0
            - name: FIFTYONE_DEFAULT_DATASET_DIR
              value: /fiftyone/default
            - name: FIFTYONE_DATASET_ZOO_DIR
              value: /fiftyone/zoo/datasets
            - name: FIFTYONE_MODEL_ZOO_DIR
              value: /fiftyone/zoo/models
            - name: FIFTYONE_PLUGINS_DIR
              value: /opt/fiftyone/plugins
            - name: FIFTYONE_S3_MOUNT_PATH
              value: /fiftyone-s3
          ports:
            - containerPort: 5151
              name: http
          volumeMounts:
            - name: workspace
              mountPath: /fiftyone
            - name: shared-data
              mountPath: /ailab
            - name: datasets
              mountPath: /datasets
            - name: s3-mount
              mountPath: /fiftyone-s3
              mountPropagation: HostToContainer
            - name: s3-mount-status
              mountPath: /s3-mount-status
              readOnly: true
            - name: startup-scripts
              mountPath: /opt/fiftyone-startup
              readOnly: true
          startupProbe:
            httpGet:
              path: /
              port: 5151
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /
              port: 5151
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 5151
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
        - name: s3-datasets
          image: >-
            efrecon/s3fs:1.95@sha256:5b4078918899cca287dcc915e8e655ee526c1851e962e24df15673e6c66473d2
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - /opt/fiftyone-startup/mount-s3-datasets.sh
          env:
            - name: FIFTYONE_S3_BUCKET
              value: mlflow
            - name: FIFTYONE_S3_PREFIX
              value: datasets
            - name: FIFTYONE_S3_MOUNT_PATH
              value: /fiftyone-s3
            - name: FIFTYONE_S3_REGION
              value: us-east-1
          envFrom:
            - secretRef:
                name: fiftyone-s3-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              memory: "512Mi"
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - |
                  test -f /s3-mount-status/ready &&
                  grep -Fq " ${FIFTYONE_S3_MOUNT_PATH} " /proc/mounts &&
                  ls "${FIFTYONE_S3_MOUNT_PATH}" >/dev/null
            periodSeconds: 60
            timeoutSeconds: 20
            failureThreshold: 5
          securityContext:
            privileged: true
            runAsUser: 0
          volumeMounts:
            - name: s3-mount
              mountPath: /fiftyone-s3
              mountPropagation: Bidirectional
            - name: s3-mount-status
              mountPath: /s3-mount-status
            - name: dev-fuse
              mountPath: /dev/fuse
            - name: startup-scripts
              mountPath: /opt/fiftyone-startup
              readOnly: true
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: fiftyone-workspace-pvc
        - name: shared-data
          persistentVolumeClaim:
            claimName: labelstudio-shared-pvc
        - name: datasets
          persistentVolumeClaim:
            claimName: fiftyone-datasets-pvc
        - name: s3-mount
          emptyDir: {}
        - name: s3-mount-status
          emptyDir: {}
        - name: startup-scripts
          configMap:
            name: fiftyone-startup-scripts
        - name: dev-fuse
          hostPath:
            path: /dev/fuse
            type: CharDevice
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fiftyone-workspace-pvc
  labels:
    app.kubernetes.io/name: fiftyone
    app.kubernetes.io/part-of: fiftyone
spec:
  storageClassName: ceph-hot-block
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fiftyone-datasets-pvc
  labels:
    app.kubernetes.io/name: fiftyone
    app.kubernetes.io/part-of: fiftyone
spec:
  storageClassName: ceph-cold-filesystem
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 4Ti
  volumeMode: Filesystem
---
apiVersion: v1
kind: Service
metadata:
  name: fiftyone
  labels:
    app.kubernetes.io/name: fiftyone
    app.kubernetes.io/part-of: fiftyone
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fiftyone
  ports:
    - name: http
      port: 5151
      targetPort: 5151
