---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fiftyone
  labels:
    app.kubernetes.io/name: fiftyone
    app.kubernetes.io/part-of: fiftyone
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: fiftyone
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fiftyone
        app.kubernetes.io/part-of: fiftyone
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: type
                    operator: In
                    values:
                      - ai-worker
      containers:
        - name: fiftyone
          image: >-
            ghcr.io/ai-cfia/fiftyone:1.15.0-python3.9-plugins-torch-20260604
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              echo "Waiting for S3 dataset mount..."
              for _ in $(seq 1 90); do
                if [ -f /s3-mount-status/ready ]; then
                  exec python -m fiftyone.server.main --port 5151
                fi
                sleep 2
              done
              echo "Timed out waiting for S3 dataset mount" >&2
              exit 1
          env:
            - name: FIFTYONE_DATABASE_URI
              value: mongodb://mongodb.mongodb.svc.cluster.local:27017/fiftyone
            - name: FIFTYONE_DEFAULT_APP_ADDRESS
              value: 0.0.0.0
            - name: FIFTYONE_DEFAULT_DATASET_DIR
              value: /fiftyone/default
            - name: FIFTYONE_DATASET_ZOO_DIR
              value: /fiftyone/zoo/datasets
            - name: FIFTYONE_MODEL_ZOO_DIR
              value: /fiftyone/zoo/models
            - name: FIFTYONE_PLUGINS_DIR
              value: /opt/fiftyone/plugins
          ports:
            - containerPort: 5151
              name: http
          volumeMounts:
            - name: workspace
              mountPath: /fiftyone
            - name: shared-data
              mountPath: /ailab
            - name: datasets
              mountPath: /datasets
            - name: s3-mount
              mountPath: /fiftyone-s3
              mountPropagation: HostToContainer
            - name: s3-mount-status
              mountPath: /s3-mount-status
              readOnly: true
          startupProbe:
            httpGet:
              path: /
              port: 5151
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 18
          readinessProbe:
            httpGet:
              path: /
              port: 5151
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 5151
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
        - name: s3-datasets
          image: >-
            efrecon/s3fs:1.95@sha256:5b4078918899cca287dcc915e8e655ee526c1851e962e24df15673e6c66473d2
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              : "${MLFLOW_S3_ENDPOINT_URL:?missing S3 endpoint URL}"
              : "${AWS_ACCESS_KEY_ID:?missing AWS access key ID}"
              : "${AWS_SECRET_ACCESS_KEY:?missing AWS secret access key}"
              : "${FIFTYONE_S3_BUCKET:?missing S3 bucket}"
              : "${FIFTYONE_S3_PREFIX:?missing S3 prefix}"

              # Remove any stale readiness flags from previous runs
              rm -f /s3-mount-status/ready

              mkdir -p "${FIFTYONE_S3_MOUNT_PATH}"

              credentials_file=/root/.passwd-s3fs
              printf '%s:%s\n' \
                "${AWS_ACCESS_KEY_ID}" \
                "${AWS_SECRET_ACCESS_KEY}" > "${credentials_file}"
              chmod 600 "${credentials_file}"

              # Ensure the FUSE allow_other option is configured idempotently.
              touch /etc/fuse.conf
              if ! grep -q '^user_allow_other' /etc/fuse.conf; then
                echo 'user_allow_other' >> /etc/fuse.conf
              fi

              # Follow the FiftyOne cloud-storage guide: mount S3 as a local
              # read-only filesystem, then let FiftyOne import from that path.
              s3fs \
                "${FIFTYONE_S3_BUCKET}:/${FIFTYONE_S3_PREFIX}" \
                "${FIFTYONE_S3_MOUNT_PATH}" \
                -f \
                -o passwd_file="${credentials_file}" \
                -o url="${MLFLOW_S3_ENDPOINT_URL}" \
                -o use_path_request_style \
                -o allow_other \
                -o ro \
                -o nonempty \
                -o compat_dir \
                -o umask=0022 \
                -o stat_cache_expire=60 \
                -o dbglevel=info &

              mount_pid="$!"

              # Clean up the readiness flag, password file, and s3fs process.
              trap 'rm -f /s3-mount-status/ready "${credentials_file}";
                kill "${mount_pid}" 2>/dev/null || true' EXIT TERM INT

              # Verify the mount point is active and listable before startup.
              for _ in $(seq 1 60); do
                if grep -Fq " ${FIFTYONE_S3_MOUNT_PATH} " /proc/mounts &&
                  ls "${FIFTYONE_S3_MOUNT_PATH}" >/dev/null 2>&1; then
                  touch /s3-mount-status/ready
                  wait "${mount_pid}"
                fi
                if ! kill -0 "${mount_pid}" 2>/dev/null; then
                  wait "${mount_pid}"
                fi
                sleep 2
              done

              echo "S3 dataset mount did not become ready" >&2
              kill "${mount_pid}" 2>/dev/null || true
              exit 1
          env:
            - name: FIFTYONE_S3_BUCKET
              value: mlflow
            - name: FIFTYONE_S3_PREFIX
              value: datasets
            - name: FIFTYONE_S3_MOUNT_PATH
              value: /fiftyone-s3
          envFrom:
            - secretRef:
                name: fiftyone-s3-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              memory: "512Mi"
          securityContext:
            privileged: true
            runAsUser: 0
          volumeMounts:
            - name: s3-mount
              mountPath: /fiftyone-s3
              mountPropagation: Bidirectional
            - name: s3-mount-status
              mountPath: /s3-mount-status
            - name: dev-fuse
              mountPath: /dev/fuse
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: fiftyone-workspace-pvc
        - name: shared-data
          persistentVolumeClaim:
            claimName: labelstudio-shared-pvc
        - name: datasets
          persistentVolumeClaim:
            claimName: fiftyone-datasets-pvc
        - name: s3-mount
          emptyDir: {}
        - name: s3-mount-status
          emptyDir: {}
        - name: dev-fuse
          hostPath:
            path: /dev/fuse
            type: CharDevice
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fiftyone-workspace-pvc
  labels:
    app.kubernetes.io/name: fiftyone
    app.kubernetes.io/part-of: fiftyone
spec:
  storageClassName: ceph-hot-block
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fiftyone-datasets-pvc
  labels:
    app.kubernetes.io/name: fiftyone
    app.kubernetes.io/part-of: fiftyone
spec:
  storageClassName: ceph-cold-filesystem
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 4Ti
  volumeMode: Filesystem
---
apiVersion: v1
kind: Service
metadata:
  name: fiftyone
  labels:
    app.kubernetes.io/name: fiftyone
    app.kubernetes.io/part-of: fiftyone
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: fiftyone
  ports:
    - name: http
      port: 5151
      targetPort: 5151
