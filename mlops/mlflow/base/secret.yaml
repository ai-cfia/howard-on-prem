apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mlflow-secrets
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-devsecops-store
    kind: ClusterSecretStore
  target:
    name: mlflow-secrets
  dataFrom:
    - extract:
        key: devsecops/cloudnativepg/mlflow-user-creds
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mlflow-s3-secrets
spec:
  refreshInterval: "15s"
  secretStoreRef:
    name: vault-secret-store
    kind: ClusterSecretStore
  target:
    name: mlflow-s3-secrets
  dataFrom:
    - extract:
        key: secrets/mlflow/s3
