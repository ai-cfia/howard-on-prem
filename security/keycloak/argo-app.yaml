apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: keycloak
  sources:
    - repoURL: https://github.com/ai-cfia/howard-on-prem.git
      path: security/keycloak/base
      targetRevision: HEAD
